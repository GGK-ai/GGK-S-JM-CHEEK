name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget automake autotools-dev libtool cmake ccache
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.ccache
          key: buildozer-cache-${{ runner.os }}

      - name: Build
        run: |
          cd jmcomic_kivy
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JMComic-APK
          path: jmcomic_kivy/bin/*.apk
