name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('jmcomic_kivy/buildozer.spec') }}

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Android SDK
        run: |
          mkdir -p ~/android
          cd ~/android
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          yes | ~/android/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;23.1.7779620" 2>&1
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android/build-tools/31.0.0" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd jmcomic_kivy
          export ANDROID_HOME=$HOME/android
          export ANDROID_SDK_ROOT=$HOME/android
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JMComic-APK
          path: jmcomic_kivy/bin/*.apk
