name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-distutils python3-pip python3-setuptools
          pip install --user python-for-android cython virtualenv
      - name: Build APK with p4a
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd jmcomic_kivy
          p4a apk \
            --requirements python3,kivy,requests \
            --private . \
            --package org.jmcomic.app \
            --name "JMComic" \
            --version 1.0 \
            --bootstrap sdl2 \
            --arch arm64-v8a \
            --android-api 31 \
            --permission INTERNET \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --debug 2>&1 | tail -50
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: jmcomic_kivy/bin/JMComic-*.apk
