name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Build APK
        run: |
          cd jmcomic_kivy
          docker run --rm -v $PWD:/app -w /app kivy/python-for-android:latest bash -c "
            pip install Cython setuptools && \
            p4a apk \
              --requirements python3,kivy,requests \
              --private . \
              --package org.jmcomic.app \
              --name JMComic禁漫宝 \
              --version 1.0 \
              --bootstrap sdl2 \
              --arch arm64-v8a \
              --android-api 34 \
              --permission INTERNET \
              --permission WRITE_EXTERNAL_STORAGE \
              --permission READ_EXTERNAL_STORAGE \
              --debug
          "
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: jmcomic_kivy/bin/*.apk
